apiVersion: skaffold/v2beta28
kind: Config
metadata:
  name: kube-backlab
build:
  artifacts:
  - image: hello-app
    context: .
    docker:
      dockerfile: Dockerfile
  local:
    push: false
deploy:
  kubectl:
    manifests:
    - k8s/*.yaml
    - k8s/worker.yaml
    - k8s/infra/postgres-pvc.yaml
  helm:
    releases:
    - name: postgres
      repo: https://charts.bitnami.com/bitnami
      remoteChart: postgresql
      namespace: infra
      createNamespace: true
      valuesFiles:
      - k8s/infra/postgres-values.yaml
